name: Build & Deploy

on:
  push:
    branches:
      - main

# Serialize gh-pages deploys + cancel in-flight obsolete runs.
# Without this, runner-queued runs can finish in non-monotonic order and
# the older run's force-push to gh-pages silently reverts the newer state.
# Observed silent revert incidents 2026-05-28 (commits cf9722c→84b2af3 +
# d23e1c5→7cee725) traced to this race. Workaround was manual force-repush.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, x64, lxc-500]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Versions
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Project-Map Gate
        run: |
          node scripts/project-map-gate.mjs
        env:
          VAULT_SERVER: http://127.0.0.1:19090
          PMAP_GATE_SKIP: '0'

      - name: Build
        run: pnpm build

      - name: Verify build output
        run: |
          test -f dist/index.html && echo "OK: index.html present"
          test -f dist/CNAME && echo "OK: CNAME present"
          test -f dist/sitemap-index.xml && echo "OK: sitemap present"
          echo "HTML size: $(wc -c < dist/index.html) bytes"
          echo "CSS size: $(find dist/_assets -name '*.css' -exec wc -c {} + 2>/dev/null | tail -1 || echo '0') bytes"

      - name: Deploy to gh-pages
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config user.name "Forgejo CI"
          git config user.email "ci@localhost"

          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          DEPLOY_DIR=$(mktemp -d /tmp/gh-pages-XXXXXX)

          # Forgejo Actions runtime variables — `github.*` namespace is the standard (compat GitHub Actions API).
          # Despite the literal word "github", this is the documented Forgejo convention since v12.x —
          # the alternative `gitea.*` was deprecated and triggers schema validation errors.
          # Anti-leak Pilier 1 (Phase B OSS flip readiness 2026-05-26) is preserved because the file
          # path `.forgejo/workflows/` already discloses the hosting platform — the variable name
          # is not an additional leak vector.
          REPO_URL="http://${{ github.repository_owner }}:${FORGEJO_TOKEN}@localhost:3000/${{ github.repository }}.git"

          # Try to clone gh-pages branch; if it doesn't exist, init orphan
          if git ls-remote --heads "${REPO_URL}" gh-pages | grep -q gh-pages; then
            git clone --branch gh-pages --depth 1 "${REPO_URL}" "${DEPLOY_DIR}"
          else
            mkdir -p "${DEPLOY_DIR}"
            cd "${DEPLOY_DIR}"
            git init -b gh-pages
            git remote add origin "${REPO_URL}"
            cd -
          fi

          # Clear old content (keep .git)
          find "${DEPLOY_DIR}" -mindepth 1 -maxdepth 1 -not -name '.git' -exec rm -rf {} +

          # Copy fresh build
          cp -r dist/. "${DEPLOY_DIR}/"

          cd "${DEPLOY_DIR}"
          git config user.name "Forgejo CI"
          git config user.email "ci@localhost"
          git add -A
          git commit -m "deploy: ${COMMIT_SHA} — ${COMMIT_MSG}" --allow-empty
          git push origin HEAD:gh-pages --force

          cd -
          rm -rf "${DEPLOY_DIR}"
          echo "Deployed to gh-pages: ${COMMIT_SHA}"

      - name: Summary
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY" || true
          echo "- Branch: gh-pages" >> "$GITHUB_STEP_SUMMARY" || true
          echo "- Domain: https://gradatum.org" >> "$GITHUB_STEP_SUMMARY" || true
          echo "- Commit: $(git rev-parse --short HEAD)" >> "$GITHUB_STEP_SUMMARY" || true
          echo "- HTML size: $(wc -c < dist/index.html) bytes" >> "$GITHUB_STEP_SUMMARY" || true
