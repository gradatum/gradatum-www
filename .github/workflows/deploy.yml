name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout gradatum-www
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout gradatum (sibling repo — RFC sources)
        uses: actions/checkout@v4
        with:
          repository: mymomot/gradatum
          path: ../gradatum
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify build output
        run: |
          test -f dist/index.html   && echo "OK: index.html"
          test -f dist/CNAME        && echo "OK: CNAME (gradatum.org)"
          test -f dist/sitemap-index.xml && echo "OK: sitemap"
          echo "HTML size: $(wc -c < dist/index.html) bytes"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
